name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  # Native runners for the architectures GitHub provides directly.
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: go vet ./...
      - run: go test -v ./...
      - name: coverage gate (100%)
        run: |
          go test -covermode=atomic -coverprofile=cov.out ./...
          pct=$(go tool cover -func=cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }
      # Coverage-guided fuzz runs natively only; under TCG emulation it is flaky.
      - run: go test -run '^$' -fuzz FuzzEncode -fuzztime 15s ./...
      - run: go test -run '^$' -fuzz FuzzDecode -fuzztime 15s ./...

  # Cross-architecture coverage under QEMU via binfmt. amd64/arm64 above run the
  # SIMD kernels natively; ppc64le (VSX) and s390x (vector facility) run their
  # generated assembly under emulation, while riscv64 and loong64 exercise the
  # pure-Go scalar fallback (no SIMD kernel on those arches). Each arch builds a
  # covered test binary, runs the full suite + fuzz seed corpus under its proper
  # emulated CPU, then enforces the 100% coverage gate on the host.
  emulated:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie", qemu: "rv64,v=true,vlen=128" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie", qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie", qemu: "qemu" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go vet ./...
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go test -c -cover -o /tmp/t.test .
      - run: docker run --rm --platform linux/${{ matrix.arch }} -e QEMU_CPU=${{ matrix.qemu }} -v /tmp:/t ${{ matrix.image }} /t/t.test -test.v -test.coverprofile=/t/cov.out
      - name: coverage gate (100%)
        run: |
          pct=$(go tool cover -func=/tmp/cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }

  # POWER8 ISA-guard lane. The `emulated` ppc64le job runs the POWER9 model, so an
  # ISA-3.0 op illegal on POWER8 (LXVB16X/STXVB16X/CNTTZD) slips through there and
  # only SIGILLs on a real POWER8 (cfarm112). This lane runs the SAME ppc64le test
  # binary under QEMU_CPU=power8 (qemu-user honors QEMU_CPU; power8 == power8e ==
  # power8_v2.0): if a VSX kernel emits an ISA-3.0 op without a POWER9 dispatch
  # gate, it SIGILLs here. No 100% coverage gate: on POWER8 a properly-gated kernel
  # takes the scalar fallback (kernel branch uncovered, ~93%); coverage is enforced
  # by the POWER9 `emulated` lane. The contract here is "must not SIGILL on POWER8".
  emulated-ppc64le-power8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=ppc64le go vet ./...
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=ppc64le go test -c -cover -o /tmp/t.test .
      - name: run ppc64le binary on POWER8 (must not SIGILL)
        run: docker run --rm --platform linux/ppc64le -e QEMU_CPU=power8 -v /tmp:/t debian:trixie /t/t.test -test.v
